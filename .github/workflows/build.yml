name: Build WLED Bambu Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ESP32 Firmware
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout this repo ──────────────────────────────────────────────
      - name: Checkout WLED-Bambu
        uses: actions/checkout@v4
        with:
          path: wled-bambu

      # ── 2. Clone WLED source ───────────────────────────────────────────────
      - name: Clone WLED 0.15 source
        run: |
          git clone --depth 1 --branch v0.15.0-b6 \
            https://github.com/wled/WLED.git wled-src

      # ── 3. Inject our custom files into WLED ──────────────────────────────
      - name: Inject Bambu files into WLED
        run: |
          # Copy source files into WLED's wled00 folder
          cp wled-bambu/src/bambu_status.h          wled-src/wled00/
          cp wled-bambu/src/bambu_status.cpp        wled-src/wled00/
          cp wled-bambu/src/wled_bambu_server.cpp   wled-src/wled00/

          # Copy data (SPIFFS) files
          cp wled-bambu/data/bambu.htm              wled-src/wled00/data/ 2>/dev/null || \
          cp wled-bambu/data/bambu.htm              wled-src/data/
          cp wled-bambu/data/bambu_default.json     wled-src/wled00/data/ 2>/dev/null || \
          cp wled-bambu/data/bambu_default.json     wled-src/data/

          # Patch the WLED main file (works with both wled00.ino and wled_main.cpp)
          python3 wled-bambu/tools/patch_wled.py wled-src/wled00/

          # Show what got patched
          echo "--- wled00 directory contents ---"
          ls wled-src/wled00/

      # ── 4. Override platformio.ini ─────────────────────────────────────────
      - name: Set up platformio_override.ini
        run: |
          cat > wled-src/platformio_override.ini << 'EOF'
          [platformio]
          default_envs = esp32dev

          [env:esp32dev]
          build_flags = ${env.build_flags}
            -D LEDPIN=5
            -D BTNPIN=-1
            -D RLYPIN=-1
            -D IRPIN=-1
            -D USERMOD_BAMBU_STATUS
          EOF

      # ── 5. Set up Python + PlatformIO ─────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      # ── 6. Cache PlatformIO packages ──────────────────────────────────────
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('wled-src/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      # ── 7. Build ──────────────────────────────────────────────────────────
      - name: Build firmware
        working-directory: wled-src
        run: pio run -e esp32dev

      # ── 8. Upload .bin as artifact ────────────────────────────────────────
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: WLED-Bambu-firmware
          path: |
            wled-src/.pio/build/esp32dev/firmware.bin
            wled-src/.pio/build/esp32dev/partitions.bin
          retention-days: 30

      # ── 9. Create a GitHub Release on tag push ────────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wled-src/.pio/build/esp32dev/firmware.bin
            wled-src/.pio/build/esp32dev/partitions.bin
          body: |
            ## WLED Bambu Firmware

            Flash `firmware.bin` to your ESP32, then go to `http://<device-ip>/bambu`
            to configure your printer IP and per-state LED effects.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
