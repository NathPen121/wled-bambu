name: Build WLED Bambu Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ESP32 Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WLED-Bambu
        uses: actions/checkout@v4
        with:
          path: wled-bambu

      - name: Clone WLED 0.15 source
        run: |
          git clone --depth 1 --branch v0.15.0-b6 \
            https://github.com/wled/WLED.git wled-src

      - name: Install Node dependencies
        working-directory: wled-src
        run: npm install

      - name: Inject Bambu files into WLED
        run: |
          cp wled-bambu/src/bambu_status.h        wled-src/wled00/
          cp wled-bambu/src/bambu_status.cpp      wled-src/wled00/
          cp wled-bambu/src/wled_bambu_server.cpp wled-src/wled00/

          if [ -d wled-src/wled00/data ]; then
            cp wled-bambu/data/bambu.htm           wled-src/wled00/data/
            cp wled-bambu/data/bambu_default.json  wled-src/wled00/data/
          else
            cp wled-bambu/data/bambu.htm           wled-src/data/
            cp wled-bambu/data/bambu_default.json  wled-src/data/
          fi

          python3 wled-bambu/tools/patch_wled.py wled-src/wled00/

          echo "--- Bambu files injected ---"
          ls wled-src/wled00/ | grep bambu

      - name: Patch WLED platformio.ini
        working-directory: wled-src
        run: |
          # 1. Remove unsupported -Wshadow flag from WLED's own ini
          sed -i 's/-Wshadow=compatible-local//g' platformio.ini
          # 2. Append our custom defines directly into the esp32dev section
          #    using python to avoid any ini inheritance issues
          python3 - << 'PYEOF'
          import re

          with open('platformio.ini', 'r') as f:
              content = f.read()

          extra = "\n  -D LEDPIN=5\n  -D BTNPIN=-1\n  -D RLYPIN=-1\n  -D IRPIN=-1"

          # Find the esp32dev build_flags and append to them
          content = re.sub(
              r'(\[env:esp32dev\].*?build_flags\s*=\s*)(.*?)(\n\[)',
              lambda m: m.group(1) + m.group(2) + extra + '\n' + m.group(3),
              content,
              flags=re.DOTALL
          )

          with open('platformio.ini', 'w') as f:
              f.write(content)

          print("platformio.ini patched successfully")
          PYEOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('wled-src/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Build firmware
        working-directory: wled-src
        run: pio run -e esp32dev

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: WLED-Bambu-firmware
          path: |
            wled-src/.pio/build/esp32dev/firmware.bin
            wled-src/.pio/build/esp32dev/partitions.bin
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wled-src/.pio/build/esp32dev/firmware.bin
            wled-src/.pio/build/esp32dev/partitions.bin
          body: |
            ## WLED Bambu Firmware
            Flash `firmware.bin` to your ESP32, then go to `http://<device-ip>/bambu`
            to configure your printer IP and per-state LED effects.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
