name: Build WLED Bambu Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build ESP32 Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WLED-Bambu
        uses: actions/checkout@v4
        with:
          path: wled-bambu

      - name: Clone WLED 0.15 source
        run: |
          git clone --depth 1 --branch v0.15.0-b6 \
            https://github.com/wled/WLED.git wled-src

      - name: Install Node dependencies
        working-directory: wled-src
        run: npm install

      - name: Inject Bambu files into WLED
        run: |
          cp wled-bambu/src/bambu_status.h        wled-src/wled00/
          cp wled-bambu/src/bambu_status.cpp      wled-src/wled00/
          cp wled-bambu/src/wled_bambu_server.cpp wled-src/wled00/

          if [ -d wled-src/wled00/data ]; then
            cp wled-bambu/data/bambu.htm           wled-src/wled00/data/
            cp wled-bambu/data/bambu_default.json  wled-src/wled00/data/
          else
            cp wled-bambu/data/bambu.htm           wled-src/data/
            cp wled-bambu/data/bambu_default.json  wled-src/data/
          fi

          python3 wled-bambu/tools/patch_wled.py wled-src/wled00/

          echo "--- Bambu files injected ---"
          ls wled-src/wled00/ | grep bambu

      - name: Patch WLED platformio.ini
        working-directory: wled-src
        run: |
          # Remove the -Wshadow flag unsupported by the old xtensa toolchain
          sed -i 's/-Wshadow=compatible-local//g' platformio.ini
          echo "Patched platformio.ini"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('wled-src/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Build firmware
        working-directory: wled-src
        run: pio run -e esp32dev


      - name: Merge into single flashable binary
        working-directory: wled-src
        run: |
          # Use PlatformIO's own esptool - already installed during build
          ESPTOOL=$(find ~/.platformio -name "esptool.py" 2>/dev/null | head -1)
          echo "esptool: $ESPTOOL"

          # Find bootloader - check all known locations
          BOOTLOADER=$(find ~/.platformio -name "bootloader_dio_40m.bin" 2>/dev/null | head -1)
          if [ -z "$BOOTLOADER" ]; then
            BOOTLOADER=$(find ~/.platformio -name "bootloader_*.bin" 2>/dev/null | head -1)
          fi
          echo "Bootloader: $BOOTLOADER"

          # List build dir so we can see what's there
          ls -la .pio/build/esp32dev/

          python3 "$ESPTOOL" --chip esp32 merge-bin \
            -o .pio/build/esp32dev/WLED-Bambu-merged.bin \
            --flash-mode dio \
            --flash-freq 40m \
            --flash-size 4MB \
            0x1000  "$BOOTLOADER" \
            0x8000  .pio/build/esp32dev/partitions.bin \
            0x10000 .pio/build/esp32dev/firmware.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: WLED-Bambu-firmware
          path: |
            wled-src/.pio/build/esp32dev/WLED-Bambu-merged.bin
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wled-src/.pio/build/esp32dev/firmware.bin
            wled-src/.pio/build/esp32dev/partitions.bin
          body: |
            ## WLED Bambu Firmware
            Flash `firmware.bin` to your ESP32, then go to `http://<device-ip>/bambu`
            to configure your printer IP and per-state LED effects.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
