name: Build WLED Bambu Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build D1 Mini Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WLED-Bambu
        uses: actions/checkout@v4
        with:
          path: wled-bambu

      - name: Clone WLED 0.15 source
        run: |
          git clone --depth 1 --branch v0.15.0-b6 \
            https://github.com/wled/WLED.git wled-src

      - name: Install Node dependencies
        working-directory: wled-src
        run: npm install

      - name: Inject Bambu files into WLED
        run: |
          cp wled-bambu/src/bambu_status.h   wled-src/wled00/
          cp wled-bambu/src/bambu_status.cpp wled-src/wled00/

          if [ -d wled-src/wled00/data ]; then
            cp wled-bambu/data/bambu.htm          wled-src/wled00/data/
            cp wled-bambu/data/bambu_default.json wled-src/wled00/data/
          else
            cp wled-bambu/data/bambu.htm          wled-src/data/
            cp wled-bambu/data/bambu_default.json wled-src/data/
          fi

          python3 wled-bambu/tools/patch_nav.py

          echo "--- Before usermod patch ---"
          grep -n "BambuUsermod\|registerUsermods" wled-src/wled00/usermods_list.cpp | head -5

          python3 wled-bambu/tools/patch_wled.py wled-src/wled00/

          echo "--- After usermod patch ---"
          grep -n "BambuUsermod\|registerUsermods" wled-src/wled00/usermods_list.cpp | head -10

      - name: Patch WLED platformio.ini
        working-directory: wled-src
        run: |
          sed -i 's/-Wshadow=compatible-local//g' platformio.ini
          python3 ../wled-bambu/tools/patch_platformio.py
          echo "  knolleary/PubSubClient@^2.8" >> platformio.ini
          echo "  -DMQTT_MAX_PACKET_SIZE=4096" >> platformio.ini
          echo "Patched platformio.ini"
          tail -5 platformio.ini

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('wled-src/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Build firmware
        working-directory: wled-src
        run: pio run -e nodemcuv2

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: WLED-Bambu-D1Mini
          path: wled-src/.pio/build/nodemcuv2/firmware.bin
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: wled-src/.pio/build/nodemcuv2/firmware.bin
          body: |
            ## WLED Bambu Firmware - D1 Mini
            Flash firmware.bin to your D1 Mini at address 0x0.
            Then go to http://4.3.2.1/bambu to configure your printer.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
